<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Manager — Stock &amp; Billing Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --paper:#EDEAE0;
    --paper-raised:#F4F2EA;
    --ink:#232323;
    --ink-soft:#5B5748;
    --ink-blue:#2B3A67;
    --margin-red:#A63D2F;
    --stock-green:#3F6C51;
    --line:#C9C2B2;
    --line-strong:#A79E88;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:980px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper-raised);
    position:relative;
    border-left:3px solid var(--margin-red);
    padding-left:28px;
    box-shadow:0 0 40px rgba(0,0,0,0.06);
  }
  .app::before{
    content:'';
    position:absolute;
    left:-3px; top:0; bottom:0;
    width:1px;
    background:repeating-linear-gradient(to bottom, var(--margin-red) 0 6px, transparent 6px 14px);
    opacity:.5;
  }
  header.top{
    padding:28px 32px 18px 24px;
    border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px;
  }
  header.top h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    margin:0;
    letter-spacing:-0.01em;
  }
  header.top .sub{
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-top:2px;
  }
  .userchip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--paper);
    border:1px solid var(--line-strong);
    padding:6px 12px;
    border-radius:2px;
    display:flex; align-items:center; gap:10px;
  }
  .userchip button{
    background:none;border:none;color:var(--margin-red);cursor:pointer;font-family:inherit;font-size:12px;padding:0;text-decoration:underline;
  }
  nav.tabs{
    display:flex; gap:2px; padding:0 24px; border-bottom:1px solid var(--line);
    overflow-x:auto; overflow-y:visible;
  }
  nav.tabs button{
    font-family:'Fraunces',serif;
    font-size:14px;
    font-weight:600;
    background:none;
    border:none;
    padding:12px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:3px solid transparent;
    white-space:nowrap;
    transition:color .15s ease, border-color .15s ease;
  }
  nav.tabs button.active{
    color:var(--ink-blue);
    border-bottom-color:var(--margin-red);
  }
  nav.tabs button:not(.active):hover{ color:var(--ink); }
  .more-wrap{position:relative;}
  .more-wrap #moreTabBtn{
    font-family:'Fraunces',serif; font-size:14px; font-weight:600; background:none; border:none;
    padding:12px 16px; cursor:pointer; color:var(--ink-soft); border-bottom:3px solid transparent; white-space:nowrap;
  }
  .more-wrap #moreTabBtn.active{ color:var(--ink-blue); border-bottom-color:var(--margin-red); }
  .more-menu{
    position:absolute; top:100%; right:0; z-index:50;
    background:var(--paper-raised); border:1px solid var(--line-strong); border-radius:4px;
    box-shadow:0 8px 24px rgba(0,0,0,0.12); min-width:180px; overflow:hidden; padding:4px;
    animation:menuIn .12s ease;
  }
  @keyframes menuIn{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }
  .more-menu button{
    display:block; width:100%; text-align:left; background:none; border:none; cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif; font-size:13px; color:var(--ink); padding:9px 12px; border-radius:3px;
  }
  .more-menu button:hover{ background:var(--paper); }
  .more-menu button.active{ color:var(--ink-blue); font-weight:600; background:var(--paper); }
  main{padding:26px 32px 60px 24px;}
  .grid{display:grid; gap:16px;}
  .cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); margin-bottom:24px;}
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    padding:16px 18px;
    border-radius:4px;
    transition:box-shadow .15s ease, transform .15s ease;
  }
  .cards .card:hover{ box-shadow:0 3px 10px rgba(35,32,25,0.08); transform:translateY(-1px); }
  .card .label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);}
  .card .value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--ink-blue);margin-top:6px;}
  .card.alert .value{color:var(--margin-red);}
  .card.good .value{color:var(--stock-green);}
  h2.section-title{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    margin:0 0 14px 0;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
    color:var(--ink-blue);
  }
  table{width:100%; border-collapse:collapse; margin-bottom:28px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); font-weight:500; padding:8px 10px; border-bottom:1px solid var(--line-strong);
  }
  td{padding:9px 10px; border-bottom:1px solid var(--line); font-size:14px;}
  td.num, th.num{font-family:'IBM Plex Mono',monospace; text-align:right; font-variant-numeric:tabular-nums;}
  tbody tr{transition:background-color .1s ease;}
  tbody tr:hover{background:rgba(43,58,103,0.035);}
  tr.low td.num.stock{color:var(--margin-red); font-weight:600;}
  tr.low td:first-child::after{content:' ⚠'; color:var(--margin-red);}
  tr.variant-row td{background:#fff; font-size:13px;}
  tr.variant-row:hover{background:#fff;}
  .form-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; align-items:end;}
  .field{display:flex; flex-direction:column; gap:4px;}
  .field label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
  .field input, .field select{
    font-family:'IBM Plex Sans',sans-serif;
    padding:8px 10px;
    border:1px solid var(--line-strong);
    background:#fff;
    border-radius:3px;
    font-size:14px;
    min-width:140px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field select:focus{
    outline:none; border-color:var(--ink-blue); box-shadow:0 0 0 3px rgba(43,58,103,0.12);
  }
  .field input[type=number]{font-family:'IBM Plex Mono',monospace;}
  button.primary{
    font-family:'Fraunces',serif;
    font-weight:600;
    background:var(--ink-blue);
    color:#fff;
    border:none;
    padding:9px 20px;
    transition:background-color .15s ease, transform .1s ease, box-shadow .15s ease;
    border-radius:2px;
    cursor:pointer;
    font-size:14px;
  }
  button.primary:hover{background:#233054;}
  button.primary:active{transform:scale(0.98);}
  button.primary.green{background:var(--stock-green);}
  button.primary.green:hover{background:#335b44;}
  button.primary.whatsapp{background:#3F6C51;}
  button.primary:disabled{opacity:.5; cursor:not-allowed;}
  button.ghost{
    background:none; border:1px solid var(--line-strong); color:var(--ink-soft);
    padding:6px 12px; border-radius:3px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif;
    transition:background-color .15s ease, border-color .15s ease, color .15s ease;
  }
  button.ghost:hover:not(:disabled){ background:var(--paper); border-color:var(--ink-blue); color:var(--ink-blue); }
  button.ghost:disabled{opacity:.35; cursor:not-allowed;}
  button.link-danger{background:none;border:none;color:var(--margin-red);cursor:pointer;font-size:12px;text-decoration:underline;}
  .msg{font-size:13px; padding:8px 12px; border-radius:4px; margin-bottom:14px; animation:msgIn .15s ease;}
  .msg.error{background:#F6E4DF; color:var(--margin-red); border:1px solid #E2B6A8;}
  .msg.ok{background:#E6EEE8; color:var(--stock-green); border:1px solid #B9D4C1;}
  @keyframes msgIn{ from{opacity:0; transform:translateY(-3px);} to{opacity:1; transform:translateY(0);} }
  .login-wrap{
    display:flex; align-items:center; justify-content:center; min-height:80vh; padding:24px;
  }
  .login-box{
    background:var(--paper); border:1px solid var(--line); padding:36px 32px; width:100%; max-width:360px; border-radius:6px;
    box-shadow:0 12px 32px rgba(35,32,25,0.10);
  }
  .login-box h1{font-family:'Fraunces',serif; font-size:24px; margin:0 0 4px 0;}
  .login-box .sub{font-size:12px; color:var(--ink-soft); margin-bottom:22px;}
  .login-box .field{margin-bottom:14px;}
  .login-box .field input, .login-box .field select{width:100%;}
  .insight-box{
    background:var(--paper); border:1px solid var(--line); padding:20px 22px; border-radius:2px;
    font-size:14px; line-height:1.7; white-space:pre-wrap;
  }
  .insight-box.empty{color:var(--ink-soft); font-style:italic;}
  .movement-type{font-family:'IBM Plex Mono',monospace; font-size:11px; padding:2px 7px; border-radius:2px;}
  .movement-type.sale{background:#F6E4DF; color:var(--margin-red);}
  .movement-type.in{background:#E6EEE8; color:var(--stock-green);}
  .movement-type.adjustment{background:#FAEEDA; color:#854F0B;}
  .loading-dot{display:inline-block; animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
  .empty-state{font-size:13px; color:var(--ink-soft); font-style:italic; padding:12px 0;}

  .billing-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:24px;}
  @media (max-width:800px){ .billing-grid{grid-template-columns:1fr;} }
  .search-results{border:1px solid var(--line); background:#fff; border-radius:2px; max-height:420px; overflow-y:auto;}
  .search-row{display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; transition:background-color .1s ease;}
  .search-row:last-child{border-bottom:none;}
  .search-row:hover{background:var(--paper);}
  .search-row:active{background:#E4DFCE;}
  .search-row .name{font-size:14px;}
  .search-row .meta{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .search-row.disabled{opacity:.4; cursor:not-allowed;}
  .variant-picker{padding:10px 12px; background:var(--paper); border-bottom:1px solid var(--line); display:flex; flex-wrap:wrap; gap:6px;}
  .cart-box{border:1px solid var(--line); background:var(--paper); border-radius:2px; padding:16px;}
  .cart-item{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line);}
  .cart-item:last-child{border-bottom:none;}
  .cart-item .cname{flex:1; font-size:13px;}
  .qty-ctrl{display:flex; align-items:center; gap:6px;}
  .qty-ctrl button{width:24px; height:24px; border:1px solid var(--line-strong); background:#fff; border-radius:2px; cursor:pointer; font-family:'IBM Plex Mono',monospace;}
  .qty-ctrl span{font-family:'IBM Plex Mono',monospace; min-width:20px; text-align:center; font-size:13px;}
  .cart-item .lineprice{font-family:'IBM Plex Mono',monospace; font-size:13px; width:64px; text-align:right;}
  .cart-item .rm{background:none;border:none;color:var(--margin-red);cursor:pointer;font-size:16px;line-height:1;}
  .cart-total{display:flex; justify-content:space-between; align-items:baseline; padding-top:12px; margin-top:8px; border-top:2px solid var(--ink-blue);}
  .cart-total .lbl{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
  .cart-total .amt{font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; color:var(--ink-blue);}
  .receipt-box{background:#fff; border:1px dashed var(--line-strong); padding:18px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; white-space:pre-wrap; line-height:1.6; margin-top:16px;}
  .grid-table th, .grid-table td{text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .grid-table th:first-child, .grid-table td:first-child{text-align:left; font-family:'IBM Plex Sans',sans-serif;}
  .grid-table input{width:56px; text-align:right; font-family:'IBM Plex Mono',monospace; padding:4px 6px; border:1px solid var(--line-strong); border-radius:2px;}
  .hint{font-size:12px; color:var(--ink-soft); margin-bottom:8px;}

  /* Icons */
  nav.tabs button svg, .more-menu button svg, .userchip button svg{ vertical-align:-3px; margin-right:3px; }
  h2.section-title svg{ vertical-align:-3px; margin-right:6px; }
  .userchip button{ display:inline-flex; align-items:center; gap:3px; }

  /* Toast notifications — float above content instead of pushing layout */
  .toast-stack{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    z-index:200; display:flex; flex-direction:column; gap:8px; width:min(90vw, 420px); pointer-events:none;
  }
  .toast-stack .msg{
    margin-bottom:0; box-shadow:0 10px 28px rgba(35,32,25,0.18); pointer-events:auto;
    animation:toastIn .18s ease;
  }
  @keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  /* Bottom mobile nav — hidden by default, shown under the breakpoint */
  nav.bottom-nav{ display:none; }

  .checkout-bar{ margin-top:14px; }

  @media (max-width:600px){
    main{padding:20px 16px 60px 12px;}
    header.top{padding:20px 16px 14px 12px;}
    .app{border-left-width:2px; padding-left:14px;}
    nav.tabs{display:none;}
    main{padding-bottom:150px;}
    .toast-stack{bottom:80px;}

    nav.bottom-nav{
      display:flex; position:fixed; left:0; right:0; bottom:0; z-index:100;
      background:var(--paper-raised); border-top:1px solid var(--line-strong);
      box-shadow:0 -4px 16px rgba(35,32,25,0.08); padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    }
    .bottom-nav-btn{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
      background:none; border:none; cursor:pointer; color:var(--ink-soft); padding:6px 2px; border-radius:6px;
      font-family:'IBM Plex Sans',sans-serif; font-size:10.5px; transition:color .15s ease, background-color .15s ease;
    }
    .bottom-nav-btn span{ letter-spacing:.01em; }
    .bottom-nav-btn.active{ color:var(--ink-blue); background:rgba(43,58,103,0.08); }
    .bottom-nav-btn:active{ background:rgba(43,58,103,0.14); }
    .more-menu-bottom{ position:fixed; left:12px; right:12px; bottom:70px; top:auto; width:auto; z-index:150; }
    .checkout-bar{
      position:fixed; left:12px; right:12px; bottom:calc(64px + env(safe-area-inset-bottom)); z-index:90;
      margin-top:0; background:var(--paper-raised); padding:8px; border-radius:8px;
      box-shadow:0 6px 20px rgba(35,32,25,0.18); border:1px solid var(--line);
    }
  }
</style>
</head>

<div id="root"></div>

<div id="scanModal" style="display:none; position:fixed; inset:0; background:rgba(20,18,14,.88); z-index:999; align-items:center; justify-content:center; flex-direction:column; padding:20px;">
  <video id="scanVideo" style="max-width:92%; max-height:65vh; border-radius:4px; border:2px solid #EDEAE0;" playsinline muted></video>

  <button id="scanCancelBtn" style="margin-top:16px; background:#A63D2F; color:#fff; border:none; padding:9px 22px; border-radius:2px; cursor:pointer; font-family:'Fraunces',serif; font-weight:600;">Cancel</button>
</div>

<script>
const DEFAULT_SHOP_NAME = 'My Shop';
const STORAGE_KEYS = { staff:'shop:staff', products:'shop:products', movements:'shop:movements', meta:'shop:meta' };

// ---- Google Drive backup setup ----
// To enable Google Drive backup: go to https://console.cloud.google.com/apis/credentials,
// create an OAuth 2.0 Client ID (type: Web application), enable the "Google Drive API" for
// the project, then under "Authorized JavaScript origins" add the exact URL where you host
// this app (e.g. https://yourname.github.io). Paste the Client ID below. Until this is set,
// the Google Drive buttons will explain what's missing instead of failing silently.
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_OAUTH_CLIENT_ID_HERE.apps.googleusercontent.com';
const DRIVE_BACKUP_FILENAME = 'shop-manager-backup.json';

// ---- Email OTP setup (for "forgot PIN" recovery) ----
// To enable: sign up free at https://www.emailjs.com, connect an email account (e.g. Gmail)
// as a "Service", create an Email Template with variables {{to_email}}, {{otp_code}},
// {{shop_name}}, {{staff_name}} — then copy your Service ID, Template ID, and Public Key below.
// Until this is set, the "Email Me a Code" option explains what's missing instead of failing silently.
const EMAILJS_CONFIG = {
  serviceId: 'YOUR_EMAILJS_SERVICE_ID',
  templateId: 'YOUR_EMAILJS_TEMPLATE_ID',
  publicKey: 'YOUR_EMAILJS_PUBLIC_KEY'
};

let state = {
  loaded:false,
  currentUser:null,
  staff:[],
  products:[],
  movements:[],
  shopMeta:{shopName:'', shopCode:''},
  cloudConnected:false,
  view:'login',
  msg:null,
  insightText:'',
  insightLoading:false,
  cart:[],
  billingSearch:'',
  pickerFor:null,
  lastReceipt:null,
  restockCart:[],
  restockSearch:'',
  restockPickerFor:null,
  expandedProductId:null,
  resetPinFor:null,
  moreOpen:false,
  forgotStaffId:null,
  forgotOtp:null,
  newStyleForm:{name:'',category:'',costPrice:'',sellPrice:'',reorderLevel:'',sizesText:'',colorsText:''},
  newStyleGrid:null,
  driveConnected:false,
  driveBusy:false,
};

async function loadAll(){
  const [s,p,m,meta] = await Promise.all([
    safeGet(STORAGE_KEYS.staff), safeGet(STORAGE_KEYS.products), safeGet(STORAGE_KEYS.movements), safeGet(STORAGE_KEYS.meta)
  ]);
  state.staff = s || [];
  state.products = p || [];
  state.movements = m || [];
  state.shopMeta = meta || {shopName:'', shopCode:''};
  state.loaded = true;
  state.view = state.staff.length === 0 ? 'setup' : 'login';
  render();
  if(state.shopMeta.shopCode) startCloudSyncOnLoad(state.shopMeta.shopCode);
}

// ---- On-device storage (IndexedDB — data lives on this device/browser) ----
const IDB_NAME = 'shopManagerDB';
const IDB_STORE = 'kv';
let idbPromise = null;

function openIDB(){
  if(idbPromise) return idbPromise;
  idbPromise = new Promise((resolve, reject)=>{
    if(!('indexedDB' in window)){ reject(new Error('IndexedDB unavailable')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return idbPromise;
}

async function safeGet(key){
  try{
    const db = await openIDB();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(IDB_STORE,'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = ()=> resolve(req.result===undefined ? null : req.result);
      req.onerror = ()=> reject(req.error);
    });
  }catch(e){ return null; }
}

async function idbPut(key, value){
  try{
    const db = await openIDB();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> reject(tx.error);
    });
  }catch(e){ console.error('save failed', key, e); }
}

async function saveKey(key, value){
  await idbPut(key, value);
  scheduleCloudSync();
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ return '₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtDate(d){ const dt=new Date(d); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Minimal inline icon set (stroke-based, 20x20, currentColor) ----
const ICONS = {
  billing: '<path d="M3 5h2l2.4 10.6a1 1 0 0 0 1 .8h8.4a1 1 0 0 0 1-.8L19.5 8H6"/><circle cx="9" cy="19" r="1.4"/><circle cx="16" cy="19" r="1.4"/>',
  dashboard: '<rect x="3.5" y="3.5" width="6.5" height="8" rx="1"/><rect x="14" y="3.5" width="6.5" height="5" rx="1"/><rect x="14" y="12" width="6.5" height="8.5" rx="1"/><rect x="3.5" y="15" width="6.5" height="5.5" rx="1"/>',
  inventory: '<path d="M3.5 7.5 12 3l8.5 4.5v9L12 21l-8.5-4.5z"/><path d="M3.5 7.5 12 12l8.5-4.5M12 12v9"/>',

// ---- Cloudflare Worker sync (keeps every staff device on the same shop data) ----
// Deploy the small Worker described in worker-setup.md (paired with this file), then paste
// its URL below — it'll look like https://shop-manager-sync.YOURNAME.workers.dev
const SYNC_API_URL = 'https://shop-manager-sync.vinayakb.workers.dev';

let pollTimer = null, cloudSyncTimer = null, lastPushedAt = 0;
const POLL_INTERVAL_MS = 4000;

function syncConfigured(){
  return SYNC_API_URL && !SYNC_API_URL.startsWith('YOUR_');
}

function genShopCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

async function generateShopCodeForExistingShop(){
  if(state.shopMeta.shopCode){ return; }
  state.shopMeta = { ...state.shopMeta, shopCode: genShopCode() };
  await saveKey(STORAGE_KEYS.meta, state.shopMeta);
  await pushToCloud();
  if(syncConfigured()) subscribeToCloud(state.shopMeta.shopCode);
  setMsg('Shop Code generated — share it with your staff','ok');
  render();
}

function scheduleCloudSync(){
  if(!state.shopMeta.shopCode || !syncConfigured()) return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(pushToCloud, 700);
}

async function pushToCloud(){
  if(!state.shopMeta.shopCode || !syncConfigured()) return;
  const updatedAt = Date.now();
  try{
    const res = await fetch(`${SYNC_API_URL}/shop/${state.shopMeta.shopCode}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ staff: state.staff, products: state.products, movements: state.movements, shopMeta: state.shopMeta, updatedAt })
    });
    if(res.ok){ lastPushedAt = updatedAt; state.cloudConnected = true; }
  }catch(e){ console.error('cloud sync failed', e); }
}

async function pollCloud(shopCode){
  if(!syncConfigured()) return;
  try{
    const res = await fetch(`${SYNC_API_URL}/shop/${shopCode}`);
    if(!res.ok) return;
    const data = await res.json();
    if(!data || data.exists===false) return;
    state.cloudConnected = true;
    if(!data.updatedAt || data.updatedAt <= lastPushedAt) { render(); return; } // stale or our own echo
    state.staff = data.staff || state.staff;
    state.products = data.products || state.products;
    state.movements = data.movements || state.movements;
    state.shopMeta = data.shopMeta || state.shopMeta;
    lastPushedAt = data.updatedAt;
    await Promise.all([
      idbPut(STORAGE_KEYS.staff, state.staff),
      idbPut(STORAGE_KEYS.products, state.products),
      idbPut(STORAGE_KEYS.movements, state.movements),
      idbPut(STORAGE_KEYS.meta, state.shopMeta),
    ]);
    render();
  }catch(e){ state.cloudConnected = false; }
}

function subscribeToCloud(shopCode){
  if(!syncConfigured()) return;
  if(pollTimer) clearInterval(pollTimer);
  pollCloud(shopCode);
  pollTimer = setInterval(()=> pollCloud(shopCode), POLL_INTERVAL_MS);
}

function startCloudSyncOnLoad(shopCode){
  // kept as a separate entry point in case startup timing needs differ from a live join later
  subscribeToCloud(shopCode);
}

async function joinShopByCode(codeRaw){
  const code = (codeRaw||'').trim().toUpperCase();
  if(!code){ setMsg('Enter a shop code','error'); return; }
  if(!syncConfigured()){ setMsg("Cross-device sync isn't set up for this copy of the app yet — see the SYNC_API_URL comment near the top of the file.",'error'); return; }
  try{
    const res = await fetch(`${SYNC_API_URL}/shop/${code}`);
    if(!res.ok){ setMsg('Could not reach the sync server — check your internet connection','error'); return; }
    const data = await res.json();
    if(!data || data.exists===false){ setMsg('No shop found with that code — check it with your shop admin','error'); return; }
    state.staff = data.staff || [];
    state.products = data.products || [];
    state.movements = data.movements || [];
    state.shopMeta = data.shopMeta || {shopName:'', shopCode:code};
    lastPushedAt = data.updatedAt || 0;
    await Promise.all([
      idbPut(STORAGE_KEYS.staff, state.staff),
      idbPut(STORAGE_KEYS.products, state.products),
      idbPut(STORAGE_KEYS.movements, state.movements),
      idbPut(STORAGE_KEYS.meta, state.shopMeta),
    ]);
    subscribeToCloud(code);
    setMsg('Joined the shop — pick your name to sign in','ok');
    state.view = state.staff.length===0 ? 'setup' : 'login';
    render();
  }catch(e){
    setMsg('Could not reach the shop — check your internet connection','error');
  }
}

// ---- Google Drive backup/restore (client-side, uses the shop owner's own Google account) ----
let gisTokenClient = null;
let googleAccessToken = null;

function googleDriveConfigured(){
  return GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith('YOUR_');
}

function initGoogleAuth(){
  if(!googleDriveConfigured() || !window.google || !window.google.accounts) return;
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (resp)=>{
      if(resp && resp.access_token){
        googleAccessToken = resp.access_token;
        state.driveConnected = true;
        setMsg('Connected to Google Drive','ok');
      } else {
        setMsg('Could not connect to Google Drive','error');
      }
      render();
    }
  });
  render();
}

function waitForGoogleThenInit(retries){
  if(retries===undefined) retries = 20;
  if(window.google && window.google.accounts){ initGoogleAuth(); return; }
  if(retries>0) setTimeout(()=>waitForGoogleThenInit(retries-1), 300);
}

function connectGoogleDrive(){
  if(!googleDriveConfigured()){
    setMsg('Google Drive isn\'t set up yet for this copy of the app — see the GOOGLE_CLIENT_ID comment near the top of the file for setup steps.','error');
    return;
  }
  if(!gisTokenClient){ setMsg('Google sign-in is still loading — try again in a moment.','error'); return; }
  gisTokenClient.requestAccessToken();
}

async function findDriveBackupFile(){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D%27${encodeURIComponent(DRIVE_BACKUP_FILENAME)}%27%20and%20trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)`, {
    headers:{ Authorization:`Bearer ${googleAccessToken}` }
  });
  if(!res.ok) throw new Error('drive list failed');
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}

async function backupToGoogleDrive(){
  if(!googleAccessToken){ setMsg('Connect Google Drive first','error'); return; }
  state.driveBusy = true; render();
  try{
    const payload = JSON.stringify({ staff:state.staff, products:state.products, movements:state.movements, shopMeta:state.shopMeta, exportedAt:new Date().toISOString() });
    const existing = await findDriveBackupFile();
    const boundary = 'shopmgrbackup';
    const metadata = { name: DRIVE_BACKUP_FILENAME, mimeType:'application/json' };
    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
    const url = existing
      ? `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const res = await fetch(url, {
      method: existing ? 'PATCH' : 'POST',
      headers:{ Authorization:`Bearer ${googleAccessToken}`, 'Content-Type':`multipart/related; boundary=${boundary}` },
      body
    });
    setMsg(res.ok ? 'Backed up to Google Drive' : 'Backup failed — try reconnecting Google Drive', res.ok ? 'ok' : 'error');
  }catch(e){
    setMsg('Backup failed — check your connection and try again','error');
  }
  state.driveBusy = false; render();
}

async function restoreFromGoogleDrive(){
  if(!googleAccessToken){ setMsg('Connect Google Drive first','error'); return; }
  state.driveBusy = true; render();
  try{
    const existing = await findDriveBackupFile();
    if(!existing){ setMsg('No backup found on Google Drive yet','error'); state.driveBusy=false; render(); return; }
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${existing.id}?alt=media`, { headers:{ Authorization:`Bearer ${googleAccessToken}` } });
    if(!res.ok) throw new Error('download failed');
    const data = await res.json();
    state.staff = data.staff || [];
    state.products = data.products || [];
    state.movements = data.movements || [];
    state.shopMeta = data.shopMeta || {shopName:''};
    await Promise.all([
      saveKey(STORAGE_KEYS.staff, state.staff),
      saveKey(STORAGE_KEYS.products, state.products),
      saveKey(STORAGE_KEYS.movements, state.movements),
      saveKey(STORAGE_KEYS.meta, state.shopMeta),
    ]);
    setMsg('Restored from Google Drive','ok');
  }catch(e){
    setMsg('Restore failed — check your connection and try again','error');
  }
  state.driveBusy = false; render();
}

// ---- Email OTP recovery ----
function emailOtpConfigured(){
  return EMAILJS_CONFIG && EMAILJS_CONFIG.publicKey && !EMAILJS_CONFIG.publicKey.startsWith('YOUR_');
}

function genOtp(){ return String(Math.floor(100000 + Math.random()*900000)); }

async function sendRecoveryOtp(staffId){
  const member = state.staff.find(s=>s.id===staffId);
  if(!member){ setMsg('Select an account','error'); return; }
  if(!member.email){ setMsg('No email is set up for this account — ask your shop admin to add one, or use the security question instead.','error'); return; }
  if(!emailOtpConfigured()){ setMsg("Email OTP isn't set up for this copy of the app yet — see the EMAILJS_CONFIG comment near the top of the file.",'error'); return; }
  const code = genOtp();
  try{
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        service_id: EMAILJS_CONFIG.serviceId,
        template_id: EMAILJS_CONFIG.templateId,
        user_id: EMAILJS_CONFIG.publicKey,
        template_params: {
          to_email: member.email,
          otp_code: code,
          shop_name: state.shopMeta.shopName || DEFAULT_SHOP_NAME,
          staff_name: member.name
        }
      })
    });
    if(res.ok){
      state.forgotOtp = { staffId, code, sentAt: Date.now() };
      setMsg(`Code sent to ${member.email}`,'ok');
    } else {
      const errText = await res.text().catch(()=> '');
      console.error('EmailJS send failed', res.status, errText);
      setMsg(`Could not send the code (EmailJS said: ${errText || res.status}) — see the checklist for this error`,'error');
    }
  }catch(e){
    console.error('EmailJS network error', e);
    setMsg('Could not send the code — check your internet connection','error');
  }
  render();
}

async function resetPinWithOtp(staffId, code, newPin, confirmPin){
  const member = state.staff.find(s=>s.id===staffId);
  if(!member){ setMsg('Select an account','error'); return; }
  if(!state.forgotOtp || state.forgotOtp.staffId!==staffId){ setMsg('Request a code first','error'); return; }
  const expired = Date.now() - state.forgotOtp.sentAt > 10*60*1000;
  if(expired){ setMsg('That code has expired — send a new one','error'); return; }
  if(!code || code.trim() !== state.forgotOtp.code){ setMsg('Incorrect code','error'); return; }
  if(!newPin || newPin.length<4){ setMsg('New PIN must be at least 4 digits','error'); return; }
  if(newPin !== confirmPin){ setMsg("PINs don't match",'error'); return; }
  member.pin = newPin;
  await saveKey(STORAGE_KEYS.staff, state.staff);
  state.forgotOtp = null;
  setMsg('PIN reset — you can log in now','ok');
  state.view = 'login';
  render();
}

async function bulkAddProducts(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length===0){ setMsg('Paste at least one product line','error'); return; }
  let added = 0, skipped = 0;
  lines.forEach(line=>{
    const parts = line.split(',').map(p=>p.trim());
    const name = parts[0];
    if(!name){ skipped++; return; }
    state.products.push({
      id:uid(), name,
      category: parts[1] || 'General',
      costPrice: Number(parts[2]) || 0,
      sellPrice: Number(parts[3]) || 0,
      stock: Number(parts[4]) || 0,
      reorderLevel: Number(parts[5]) || 5,
      barcode: parts[6] || '',
      hasVariants:false
    });
    added++;
  });
  await saveKey(STORAGE_KEYS.products, state.products);
  setMsg(`Added ${added} product${added!==1?'s':''}${skipped?`, skipped ${skipped} bad line${skipped!==1?'s':''}`:''}`, 'ok');
  render();
}

async function commitRestock(){
  if(state.restockCart.length===0){ setMsg('Restock list is empty','error'); return; }
  const now = new Date().toISOString();
  let count = 0;
  for(const item of state.restockCart){
    const product = state.products.find(p=>p.id===item.productId);
    if(!product) continue;
    const qty = Number(item.qty)||0;
    if(qty<=0) continue;
    let label = product.name;
    if(item.variantId){
      const variant = product.variants.find(v=>v.id===item.variantId);
      if(!variant) continue;
      variant.stock += qty;
      label = `${product.name} — ${variantLabel(variant)}`;
    } else {
      product.stock += qty;
    }
    state.movements.unshift({
      id:uid(), productId:item.productId, variantId:item.variantId||null, productName:label, type:'in', qty,
      amount:Number(product.costPrice)*qty, date:now, staff:state.currentUser.name, note:item.note||''
    });
    count++;
  }
  await Promise.all([saveKey(STORAGE_KEYS.products,state.products), saveKey(STORAGE_KEYS.movements,state.movements)]);
  setMsg(`Stocked in ${count} item${count!==1?'s':''}`,'ok');
  state.restockCart = [];
  state.restockSearch = '';
  render();
}

function lookupByBarcode(code){
  const value = code.trim();
  return state.products.find(p=>!p.hasVariants && p.barcode && p.barcode===value) || null;
}

// ---------- Fast Billing (cart) ----------
function addToCart(productId, variantId){
  const product = state.products.find(p=>p.id===productId);
  if(!product) return;
  let stockAvail, label;
  if(product.hasVariants){
    if(!variantId){ setMsg('Pick a size/color first','error'); return; }
    const variant = product.variants.find(v=>v.id===variantId);
    if(!variant) return;
    stockAvail = variant.stock;
    label = `${product.name} — ${variantLabel(variant)}`;
  } else {
    stockAvail = product.stock;
    label = product.name;
  }
  if(stockAvail<=0){ setMsg(`${label} is out of stock`,'error'); return; }
  const cartKey = variantId ? `${productId}::${variantId}` : productId;
  const existing = state.cart.find(c=>c.cartKey===cartKey);
  if(existing){
    if(existing.qty < stockAvail) existing.qty += 1;
    else setMsg(`Only ${stockAvail} in stock`,'error');
  } else {
    state.cart.push({cartKey, productId, variantId:variantId||null, name:label, qty:1, price:product.sellPrice});
  }
  state.billingSearch='';
  state.pickerFor=null;
  render();
}

function cartStockCap(item){
  const product = state.products.find(p=>p.id===item.productId);
  if(!product) return 0;
  if(item.variantId){
    const variant = product.variants.find(v=>v.id===item.variantId);
    return variant ? variant.stock : 0;
  }
  return product.stock;
}

function changeCartQty(cartKey, delta){
  const item = state.cart.find(c=>c.cartKey===cartKey);
  if(!item) return;
  const cap = cartStockCap(item);
  const newQty = item.qty + delta;
  if(newQty<=0){ state.cart = state.cart.filter(c=>c.cartKey!==cartKey); }
  else if(newQty > cap){ setMsg(`Only ${cap} in stock`,'error'); return; }
  else item.qty = newQty;
  render();
}

function removeFromCart(cartKey){
  state.cart = state.cart.filter(c=>c.cartKey!==cartKey);
  render();
}

function cartTotal(){
  return state.cart.reduce((sum,c)=>sum + c.qty*c.price, 0);
}

async function completeSale(){
  if(state.cart.length===0){ setMsg('Cart is empty','error'); return; }
  const now = new Date().toISOString();
  const soldItems = [];
  for(const item of state.cart){
    const product = state.products.find(p=>p.id===item.productId);
    if(!product) continue;
    let target, qty;
    if(item.variantId){
      const variant = product.variants.find(v=>v.id===item.variantId);
      if(!variant) continue;
      qty = Math.min(item.qty, variant.stock);
      if(qty<=0) continue;
      variant.stock -= qty;
      target = variant;
    } else {
      qty = Math.min(item.qty, product.stock);
      if(qty<=0) continue;
      product.stock -= qty;
    }
    state.movements.unshift({
      id:uid(), productId:item.productId, variantId:item.variantId||null, productName:item.name, type:'sale', qty,
      amount: item.price*qty, date:now, staff:state.currentUser.name, note:''
    });
    soldItems.push({name:item.name, qty, price:item.price, lineTotal:item.price*qty});
  }
  await Promise.all([saveKey(STORAGE_KEYS.products,state.products), saveKey(STORAGE_KEYS.movements,state.movements)]);
  state.lastReceipt = { items:soldItems, total:soldItems.reduce((a,i)=>a+i.lineTotal,0), date:now, staff:state.currentUser.name };
  state.cart = [];
  state.billingSearch='';
  setMsg('Sale completed','ok');
  render();
}

function buildReceiptText(receipt){
  const lines = [];
  lines.push(`🧾 ${state.shopMeta.shopName || DEFAULT_SHOP_NAME}`);
  lines.push(new Date(receipt.date).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'}));
  lines.push('------------------------------');
  receipt.items.forEach(i=>{
    lines.push(`${i.name}  x${i.qty}  ${fmtMoney(i.lineTotal)}`);
  });
  lines.push('------------------------------');
  lines.push(`Total: ${fmtMoney(receipt.total)}`);
  lines.push('');
  lines.push('Thank you for shopping with us!');
  return lines.join('\n');
}

function sendReceiptWhatsapp(phone){

function addToRestockCart(productId, variantId){

function setRestockQty(cartKey, qty){

// ---------- ₹ Leak Report ----------
function computeDeadStock(){
  const cutoff = Date.now() - 30*86400000;
  const soldRecently = new Set();
  state.movements.forEach(m=>{
    if(m.type==='sale' && new Date(m.date).getTime()>=cutoff){
      soldRecently.add(m.variantId ? `${m.productId}::${m.variantId}` : m.productId);
    }
  });
  let totalValue = 0; const items=[];
  state.products.forEach(p=>{
    if(p.hasVariants){
      p.variants.forEach(v=>{
        if(v.stock>0 && !soldRecently.has(`${p.id}::${v.id}`)){
          const val = v.stock*p.costPrice; totalValue+=val;
          items.push({name:`${p.name} — ${variantLabel(v)}`, stock:v.stock, value:val});
        }
      });
    } else if(p.stock>0 && !soldRecently.has(p.id)){
      const val = p.stock*p.costPrice; totalValue+=val;
      items.push({name:p.name, stock:p.stock, value:val});
    }
  });
  items.sort((a,b)=>b.value-a.value);
  return {totalValue, items};
}

function computeStockoutLoss(){
  const cutoff = Date.now() - 60*86400000;
  let totalValue = 0; const items=[];
  function evalItem(key, stock, sellPrice, name){
    if(stock>0) return;
    const sold = state.movements.filter(m=> m.type==='sale' && new Date(m.date).getTime()>=cutoff && (m.variantId ? `${m.productId}::${m.variantId}`===key : m.productId===key));
    const totalQty = sold.reduce((a,m)=>a+m.qty,0);
    if(totalQty<=0) return;
    const avgPerDay = totalQty/60;
    const estValue = avgPerDay*14*sellPrice;
    if(estValue>0){ totalValue+=estValue; items.push({name, estValue}); }
  }
  state.products.forEach(p=>{
    if(p.hasVariants) p.variants.forEach(v=> evalItem(`${p.id}::${v.id}`, v.stock, p.sellPrice, `${p.name} — ${variantLabel(v)}`));
    else evalItem(p.id, p.stock, p.sellPrice, p.name);
  });
  items.sort((a,b)=>b.estValue-a.estValue);
  return {totalValue, items};
}

function computeShrinkage(){
  const cutoff = Date.now() - 30*86400000;
  const adj = state.movements.filter(m=>m.type==='adjustment' && m.qty<0 && new Date(m.date).getTime()>=cutoff);
  const totalValue = adj.reduce((a,m)=>a+Math.abs(m.amount),0);
  return {totalValue, items: adj.map(m=>({name:m.productName, value:Math.abs(m.amount), qty:Math.abs(m.qty), date:m.date}))};
}

async function submitReconcile(formData){
  let totalShrinkValue = 0, changedCount = 0;
  const now = new Date().toISOString();
  function processRow(productId, variantId, currentStock, costPrice, label, applyStock){
    const key = variantId ? `${productId}::${variantId}` : productId;
    const val = formData.get(`count_${key}`);
    if(val===null || val==='') return;
    const counted = Math.max(0, Math.floor(Number(val))||0);
    const diff = counted - currentStock;
    if(diff===0) return;
    applyStock(counted);
    const amount = diff*costPrice;
    state.movements.unshift({id:uid(), productId, variantId:variantId||null, productName:label, type:'adjustment', qty:diff, amount, date:now, staff:state.currentUser.name, note:'Physical count adjustment'});
    changedCount++;
    if(diff<0) totalShrinkValue += Math.abs(amount);
  }
  state.products.forEach(p=>{
    if(p.hasVariants){
      p.variants.forEach(v=> processRow(p.id, v.id, v.stock, p.costPrice, `${p.name} — ${variantLabel(v)}`, (c)=>{ v.stock=c; }));
    } else {
      processRow(p.id, null, p.stock, p.costPrice, p.name, (c)=>{ p.stock=c; });
    }
  });
  await Promise.all([saveKey(STORAGE_KEYS.products,state.products), saveKey(STORAGE_KEYS.movements,state.movements)]);
  if(changedCount===0) setMsg('No changes — counts matched your system stock','ok');
  else if(totalShrinkValue>0) setMsg(`Found ${fmtMoney(totalShrinkValue)} in shrinkage across ${changedCount} item(s)`,'error');
  else setMsg(`Updated ${changedCount} item(s) — no losses found`,'ok');
  render();
}

async function generateInsights(){
  state.insightLoading = true;
  state.insightText='';
  render();
  try{
    const salesByProduct = {};
    const last30 = state.movements.filter(m=>{
      const days = (Date.now()-new Date(m.date).getTime())/86400000;
      return days<=30 && m.type==='sale';
    });
    last30.forEach(m=>{
      salesByProduct[m.productName] = (salesByProduct[m.productName]||0)+m.qty;
    });
    const lowStock = [];
    state.products.forEach(p=>{
      if(p.hasVariants){
        p.variants.forEach(v=>{ if(v.stock<=p.reorderLevel) lowStock.push(`${p.name} ${variantLabel(v)} (stock ${v.stock}, reorder at ${p.reorderLevel})`); });
      } else if(p.stock<=p.reorderLevel){
        lowStock.push(`${p.name} (stock ${p.stock}, reorder at ${p.reorderLevel})`);
      }
    });
    const summary = {
      totalStyles: state.products.length,
      last30DaysUnitsSoldByItem: salesByProduct,
      lowStockItems: lowStock,
      totalSalesValueLast30Days: last30.reduce((a,m)=>a+m.amount,0),
    };
    const prompt = `You are analyzing a small Indian retail shop's inventory and sales data. Some items have variants like size, color, or weight (shown as "Item Variant"). Here is a JSON summary of the last 30 days:
${JSON.stringify(summary,null,2)}

Give practical, concise insights for the shop owner in plain text (no markdown headers, just short paragraphs or a simple dash list):
1. Best-selling items/sizes/colors and any pattern worth noting
2. Slow-moving or low-stock items needing attention, with a restock suggestion
3. One or two concrete actions the owner could take this week
Keep it under 180 words, friendly and direct, no fluff.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user", content:prompt}]
      })
    });
    const data = await response.json();
    const text = (data.content||[]).map(b=>b.text||'').join('\n').trim();
    state.insightText = text || 'No insights returned. Try again once you have a bit more sales data logged.';
  }catch(e){
    state.insightText = 'Could not generate insights right now. Please try again.';
  }
  state.insightLoading = false;
  render();
}

// ---------- Barcode scanning ----------
let scanStream = null;
let scanRAF = null;
let scanTargetHandler = null;

async function startScan(onMatch){
  const modal = document.getElementById('scanModal');
  const video = document.getElementById('scanVideo');
  const status = document.getElementById('scanStatus');
  if(!('BarcodeDetector' in window)){
    setMsg("Camera barcode scanning isn't supported on this browser. Try Chrome on Android, or search by name instead.",'error');
    return;
  }
  scanTargetHandler = onMatch;
  modal.style.display = 'flex';
  status.textContent = 'Point the camera at the barcode…';
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = scanStream;
    await video.play();
    const detector = new BarcodeDetector();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const tick = async ()=>{
      if(!scanStream) return;
      if(video.videoWidth){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0);
        try{
          const codes = await detector.detect(canvas);
          if(codes.length>0){
            const value = codes[0].rawValue;
            const product = lookupByBarcode(value);
            stopScan();
            if(product){ scanTargetHandler(product); }
            else { setMsg(`No product matches barcode ${value}. Barcode scan works for non-variant items — add it via Inventory.`,'error'); }
            return;
          }
        }catch(e){ /* keep trying */ }
      }
      scanRAF = requestAnimationFrame(tick);
    };
    tick();
  }catch(e){
    setMsg('Could not access the camera — check permissions.','error');
    modal.style.display = 'none';
  }
}

function stopScan(){
  const modal = document.getElementById('scanModal');
  if(modal) modal.style.display = 'none';
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF = null; }
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

function renderSparkline(){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(Date.now() - i*86400000);
    days.push(d.toISOString().slice(0,10));
  }
  const totals = days.map(d=>
    state.movements.filter(m=>m.type==='sale' && m.date.slice(0,10)===d).reduce((a,m)=>a+m.amount,0)
  );
  const max = Math.max(...totals, 1);
  const w = 640, h = 110, padX = 6, padY = 14;
  const stepX = (w - padX*2) / (days.length-1);
  const points = totals.map((v,i)=>{
    const x = padX + i*stepX;
    const y = h - padY - (v/max)*(h - padY*2);
    return [x,y];
  });
  const linePath = points.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${points[points.length-1][0].toFixed(1)},${h-padY} L${points[0][0].toFixed(1)},${h-padY} Z`;
  const dayLabels = days.map(d=> new Date(d).toLocaleDateString('en-IN',{weekday:'short'}));

  return `
    <div style="overflow-x:auto;">
      <svg viewBox="0 0 ${w} ${h+18}" style="width:100%; max-width:640px; height:auto;">
        <path d="${areaPath}" fill="#2B3A67" opacity="0.08"/>
        <path d="${linePath}" fill="none" stroke="#2B3A67" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===points.length-1?4:2.5}" fill="${i===points.length-1?'#A63D2F':'#2B3A67'}"/>`).join('')}
        ${dayLabels.map((lbl,i)=>`<text x="${(padX+i*stepX).toFixed(1)}" y="${h+14}" font-size="9" fill="#5B5748" text-anchor="middle" font-family="IBM Plex Mono, monospace">${lbl}</text>`).join('')}
      </svg>
    </div>
  `;
}

// ---------- Leak Report & Reconcile views ----------
function renderLeakReport(){
  const dead = computeDeadStock();
  const stockout = computeStockoutLoss();
  const shrink = computeShrinkage();
  const total = dead.totalValue + stockout.totalValue + shrink.totalValue;
  const nothing = dead.items.length===0 && stockout.items.length===0 && shrink.items.length===0;

  return `
    <h2 class="section-title">₹ Leak Report</h2>
    <div class="hint">A live estimate of money tied up or lost right now — computed from your own sales and stock data. No guessing.</div>
    <div class="grid cards">
      <div class="card alert"><div class="label">Total at risk</div><div class="value">${fmtMoney(total)}</div></div>
      <div class="card"><div class="label">Dead stock (capital tied up)</div><div class="value">${fmtMoney(dead.totalValue)}</div></div>
      <div class="card"><div class="label">Estimated lost sales</div><div class="value">${fmtMoney(stockout.totalValue)}</div></div>
      <div class="card"><div class="label">Shrinkage (30 days)</div><div class="value">${fmtMoney(shrink.totalValue)}</div></div>
    </div>
    ${nothing ? '<div class="empty-state">Nothing detected yet — keep billing and stocking through the app to build up data, or run a Stock Count to check for shrinkage.</div>' : ''}
    ${dead.items.length ? `
    <h2 class="section-title">Dead Stock — not sold in 30 days</h2>
    <div class="hint">Capital sitting on your shelf instead of in your pocket. Consider a clearance offer on these.</div>
    <table><thead><tr><th>Item</th><th class="num">Stock</th><th class="num">Value</th></tr></thead>
    <tbody>${dead.items.slice(0,10).map(i=>`<tr><td>${escapeHtml(i.name)}</td><td class="num">${i.stock}</td><td class="num">${fmtMoney(i.value)}</td></tr>`).join('')}</tbody></table>` : ''}
    ${stockout.items.length ? `
    <h2 class="section-title">Stockouts — estimated lost sales (next 14 days)</h2>
    <div class="hint">These were selling steadily, then hit zero stock. Based on their recent pace, here's roughly what restocking them could recover.</div>
    <table><thead><tr><th>Item</th><th class="num">Est. Value</th></tr></thead>
    <tbody>${stockout.items.slice(0,10).map(i=>`<tr><td>${escapeHtml(i.name)}</td><td class="num">${fmtMoney(i.estValue)}</td></tr>`).join('')}</tbody></table>` : ''}
    ${shrink.items.length ? `
    <h2 class="section-title">Shrinkage Found (from Stock Counts)</h2>
    <table><thead><tr><th>Date</th><th>Item</th><th class="num">Qty</th><th class="num">Value</th></tr></thead>
    <tbody>${shrink.items.slice(0,10).map(i=>`<tr><td>${fmtDate(i.date)}</td><td>${escapeHtml(i.name)}</td><td class="num">${i.qty}</td><td class="num">${fmtMoney(i.value)}</td></tr>`).join('')}</tbody></table>` : ''}
  `;
}

function renderReconcile(){
  if(state.products.length===0) return renderNoProductsPrompt();
  const rows = [];
  state.products.forEach(p=>{
    if(p.hasVariants) p.variants.forEach(v=> rows.push({key:`${p.id}::${v.id}`, name:`${p.name} — ${variantLabel(v)}`, system:v.stock}));
    else rows.push({key:p.id, name:p.name, system:p.stock});
  });
  return `
    <h2 class="section-title">Count &amp; Catch Losses</h2>
    <div class="hint">Physically count your shelf and enter what you actually find. Leave a box blank if it matches — only mismatches get logged. Anything short shows up as shrinkage in the ₹ Leak Report.</div>
    <form id="reconcileForm">
      <table><thead><tr><th>Item</th><th class="num">System Stock</th><th class="num">Counted</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td>${escapeHtml(r.name)}</td><td class="num">${r.system}</td><td class="num"><input type="number" min="0" name="count_${r.key}" placeholder="${r.system}" style="width:70px;text-align:right;font-family:'IBM Plex Mono',monospace;padding:4px 6px;border:1px solid var(--line-strong);border-radius:2px;"></td></tr>`).join('')}</tbody></table>
      <div class="form-row" style="margin-top:14px;"><button class="primary" type="submit">Save Count</button></div>
    </form>
  `;
}

      </div>

      ${!hasQuestion && !hasEmail ? `<div class="hint">No recovery method is set up for this account — ask your shop admin to reset your PIN from the Staff tab instead.</div>` : ''}

  }
  if(state.view==='setup'){
    return `<div class="login-wrap"><div class="login-box">
      <h1>Shop Manager</h1>
      <div class="sub">Set up the shop's admin account</div>
      ${state.msg?`<div class="msg ${state.msg.type}">${escapeHtml(state.msg.text)}</div>`:''}
      <form id="setupForm">
        <div class="field"><label>Shop Name</label><input name="shopName" placeholder="e.g. Sri Ganesh Store" required></div>
        <div class="field"><label>Your Name</label><input name="name" required></div>
        <div class="field"><label>Set a 4-digit PIN</label><input name="pin" maxlength="6" inputmode="numeric" pattern="[0-9]*" required></div>
        <div class="field"><label>Your Email (optional, for OTP recovery)</label><input name="email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Recovery Question</label><input name="secQuestion" placeholder="e.g. My first shop's name?" required></div>
        <div class="field"><label>Recovery Answer</label><input name="secAnswer" placeholder="Only you should know this" required></div>
        <button class="primary" type="submit" style="width:100%;">Create Admin Account</button>
      </form>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:14px;">The recovery question is how you get back in if you ever forget your PIN — pick something only you'd know. Your data is saved on this device, and synced live to every staff device once Sync is set up (see the Sync tab after you're in).</div>
      <a href="#" id="goToJoinLink" style="font-size:12px;color:var(--ink-blue);display:inline-block;margin-top:12px;">→ Already have a Shop Code? Join an existing shop</a>
    </div></div>`;
  }
  return `<div class="login-wrap"><div class="login-box">
    <h1>Shop Manager</h1>
    <div class="sub">Sign in to the register</div>
    ${state.msg?`<div class="msg ${state.msg.type}">${escapeHtml(state.msg.text)}</div>`:''}
    <form id="loginForm">
      <div class="field"><label>Name</label>
        <select name="staffId">${state.staff.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>PIN</label><input name="pin" type="password" maxlength="6" inputmode="numeric" pattern="[0-9]*" required></div>
      <button class="primary" type="submit" style="width:100%;">Log In</button>
    </form>
    <a href="#" id="goToForgotLink" style="font-size:12px;color:var(--ink-blue);display:inline-block;margin-top:12px;">Forgot your PIN?</a>
  </div></div>`;
}

// ---------- Event wiring ----------
function attachLoginHandlers(){
  const setupForm = document.getElementById('setupForm');
  if(setupForm) setupForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); createAdmin(f.get('shopName'), f.get('name'), f.get('pin'), f.get('email'), f.get('secQuestion'), f.get('secAnswer')); };
  const loginForm = document.getElementById('loginForm');
  if(loginForm) loginForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); loginStaff(f.get('staffId'), f.get('pin')); };
  const joinForm = document.getElementById('joinForm');
  if(joinForm) joinForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); joinShopByCode(f.get('shopCode')); };
  const goToJoinLink = document.getElementById('goToJoinLink');
  if(goToJoinLink) goToJoinLink.onclick = (e)=>{ e.preventDefault(); state.view='join'; render(); };
  const backToSetupLink = document.getElementById('backToSetupLink');
  if(backToSetupLink) backToSetupLink.onclick = (e)=>{ e.preventDefault(); state.view='setup'; render(); };
  const goToForgotLink = document.getElementById('goToForgotLink');
  if(goToForgotLink) goToForgotLink.onclick = (e)=>{ e.preventDefault(); state.forgotStaffId=null; state.forgotOtp=null; state.view='forgot'; render(); };
  const backToLoginLink = document.getElementById('backToLoginLink');
  if(backToLoginLink) backToLoginLink.onclick = (e)=>{ e.preventDefault(); state.view='login'; render(); };
  const forgotStaffSelect = document.getElementById('forgotStaffSelect');
  if(forgotStaffSelect) forgotStaffSelect.onchange = ()=>{ state.forgotStaffId = forgotStaffSelect.value; state.forgotOtp=null; render(); };
  const sendOtpBtn = document.getElementById('sendOtpBtn');
  if(sendOtpBtn) sendOtpBtn.onclick = ()=> sendRecoveryOtp(state.forgotStaffId || (state.staff[0] && state.staff[0].id));
  const resendOtpLink = document.getElementById('resendOtpLink');
  if(resendOtpLink) resendOtpLink.onclick = (e)=>{ e.preventDefault(); sendRecoveryOtp(state.forgotStaffId || (state.staff[0] && state.staff[0].id)); };
  const otpResetForm = document.getElementById('otpResetForm');
  if(otpResetForm) otpResetForm.onsubmit = (e)=>{
    e.preventDefault();
    const f = new FormData(e.target);
    resetPinWithOtp(state.forgotStaffId || (state.staff[0] && state.staff[0].id), f.get('code'), f.get('newPin'), f.get('confirmPin'));
  };
  const forgotForm = document.getElementById('forgotForm');
  if(forgotForm){
    forgotForm.onsubmit = (e)=>{
      e.preventDefault();
      const f = new FormData(e.target);
      resetPinWithSecurity(state.forgotStaffId || (state.staff[0] && state.staff[0].id), f.get('answer'), f.get('newPin'), f.get('confirmPin'));
    };
  }
}

function attachAppHandlers(){
  document.getElementById('logoutBtn').onclick = logout;
  const jumpToInventoryBtn = document.getElementById('jumpToInventoryBtn');
  if(jumpToInventoryBtn) jumpToInventoryBtn.onclick = ()=>{ state.view='inventory'; render(); };
  document.querySelectorAll('nav.tabs button[data-view], nav.bottom-nav button[data-view], .more-menu button[data-view]').forEach(btn=>{
    btn.onclick = ()=>{ state.view = btn.dataset.view; state.insightText=''; state.pickerFor=null; state.moreOpen=false; render(); };
  });
  const moreTabBtn = document.getElementById('moreTabBtn');
  if(moreTabBtn) moreTabBtn.onclick = (e)=>{ e.stopPropagation(); state.moreOpen = !state.moreOpen; render(); };
  const moreTabBtnMobile = document.getElementById('moreTabBtnMobile');
  if(moreTabBtnMobile) moreTabBtnMobile.onclick = (e)=>{ e.stopPropagation(); state.moreOpen = !state.moreOpen; render(); };

  // Billing
  const searchInput = document.getElementById('billingSearchInput');
  if(searchInput){
    searchInput.oninput = (e)=>{ state.billingSearch = e.target.value; state.pickerFor=null; render(); };
    searchInput.onkeydown = (e)=>{
      if(e.key!=='Enter') return;
      e.preventDefault();
      const q = state.billingSearch.trim();
      if(!q) return;
      const exact = lookupByBarcode(q);
      if(exact){ addToCart(exact.id); return; }
      const ql = q.toLowerCase();
      const matches = state.products.filter(p=> p.name.toLowerCase().includes(ql) || (p.barcode && p.barcode.includes(q)));
      if(matches.length===1){
        if(matches[0].hasVariants){ state.pickerFor = matches[0].id; render(); }
        else addToCart(matches[0].id);
      }
    };
    searchInput.focus();
    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
  }
  document.querySelectorAll('[data-pick]').forEach(row=>{
    row.onclick = ()=>{
      if(row.classList.contains('disabled')) return;
      const productId = row.dataset.pick;
      const product = state.products.find(p=>p.id===productId);
      if(product && product.hasVariants){
        state.pickerFor = state.pickerFor===productId ? null : productId;
        render();
      } else {
        addToCart(productId);
      }
    };
  });
  document.querySelectorAll('[data-addvariant]').forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      const [pid, vid] = b.dataset.addvariant.split('::');
      addToCart(pid, vid);
    };
  });
  document.querySelectorAll('[data-qty-plus]').forEach(b=> b.onclick = ()=> changeCartQty(b.dataset.qtyPlus, 1));
  document.querySelectorAll('[data-qty-minus]').forEach(b=> b.onclick = ()=> changeCartQty(b.dataset.qtyMinus, -1));
  document.querySelectorAll('[data-rm]').forEach(b=> b.onclick = ()=> removeFromCart(b.dataset.rm));
  const scanBillingBtn = document.getElementById('scanBillingBtn');
  if(scanBillingBtn) scanBillingBtn.onclick = ()=> startScan((product)=>{ addToCart(product.id); setMsg(`Added: ${product.name}`,'ok'); });
  const checkoutBtn = document.getElementById('checkoutBtn');
  if(checkoutBtn) checkoutBtn.onclick = ()=>{
    if(checkoutBtn.disabled) return;
    checkoutBtn.disabled = true;
    checkoutBtn.textContent = 'Processing…';
    completeSale();
  };
  const sendReceiptBtn = document.getElementById('sendReceiptBtn');
  if(sendReceiptBtn) sendReceiptBtn.onclick = ()=>{
    const phone = document.getElementById('receiptPhone').value;
    sendReceiptWhatsapp(phone);
  };
  const newSaleBtn = document.getElementById('newSaleBtn');
  if(newSaleBtn) newSaleBtn.onclick = newSale;

  // Inventory — variant product grid
  const genGridBtn = document.getElementById('genGridBtn');
  if(genGridBtn) genGridBtn.onclick = ()=>{
    state.newStyleForm.name = document.getElementById('styleName').value;
    state.newStyleForm.category = document.getElementById('styleCategory').value;
    state.newStyleForm.costPrice = document.getElementById('styleCost').value;
    state.newStyleForm.sellPrice = document.getElementById('styleSell').value;
    state.newStyleForm.reorderLevel = document.getElementById('styleReorder').value;
    const sizesText = document.getElementById('styleSizes').value;
    const colorsText = document.getElementById('styleColors').value;
    state.newStyleForm.sizesText = sizesText;
    state.newStyleForm.colorsText = colorsText;
    const sizes = sizesText.split(',').map(s=>s.trim()).filter(Boolean);
    let colors = colorsText.split(',').map(c=>c.trim()).filter(Boolean);
    if(colors.length===0) colors = [''];
    if(sizes.length===0){ setMsg('Enter at least one size','error'); return; }
    state.newStyleGrid = {sizes, colors};
    render();
  };
  const addStyleForm = document.getElementById('addStyleForm');
  if(addStyleForm) addStyleForm.onsubmit = (e)=>{
    e.preventDefault();
    if(!state.newStyleGrid){ setMsg('Click "Generate Size/Color Grid" first','error'); return; }
    const f = new FormData(e.target);
    const {sizes, colors} = state.newStyleGrid;
    const variants = [];
    sizes.forEach((s,i)=>{
      colors.forEach((c,j)=>{
        const stock = f.get(`cell_${i}_${j}`);
        variants.push({size:s, color:c, stock});
      });
    });
    addStyleWithVariants({name:f.get('name'), category:f.get('category'), costPrice:f.get('costPrice'), sellPrice:f.get('sellPrice'), reorderLevel:f.get('reorderLevel')}, variants);
  };

  // Inventory — simple products
  const addProductForm = document.getElementById('addProductForm');
  if(addProductForm) addProductForm.onsubmit = (e)=>{
    e.preventDefault(); const f=new FormData(e.target);
    addProduct({name:f.get('name'), category:f.get('category'), costPrice:f.get('costPrice'), sellPrice:f.get('sellPrice'), stock:f.get('stock'), reorderLevel:f.get('reorderLevel'), barcode:f.get('barcode')});
    e.target.reset();
  };
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=>{ if(confirm('Remove this product? This does not delete its past sales history, only the product itself.')) deleteProduct(b.dataset.del); });
  document.querySelectorAll('[data-expand]').forEach(b=> b.onclick = ()=>{ state.expandedProductId = state.expandedProductId===b.dataset.expand ? null : b.dataset.expand; render(); });
  const bulkAddForm = document.getElementById('bulkAddForm');
  if(bulkAddForm) bulkAddForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); bulkAddProducts(f.get('bulk')); e.target.reset(); };

  // Stock In (restock cart)
  const restockSearchInput = document.getElementById('restockSearchInput');
  if(restockSearchInput){
    restockSearchInput.oninput = (e)=>{ state.restockSearch = e.target.value; state.restockPickerFor=null; render(); };
    restockSearchInput.onkeydown = (e)=>{
      if(e.key!=='Enter') return;
      e.preventDefault();
      const q = state.restockSearch.trim();
      if(!q) return;
      const exact = lookupByBarcode(q);
      if(exact){ addToRestockCart(exact.id); return; }
      const ql = q.toLowerCase();
      const matches = state.products.filter(p=> p.name.toLowerCase().includes(ql) || (p.barcode && p.barcode.includes(q)));
      if(matches.length===1){
        if(matches[0].hasVariants){ state.restockPickerFor = matches[0].id; render(); }
        else addToRestockCart(matches[0].id);
      }
    };
    restockSearchInput.focus();
    restockSearchInput.setSelectionRange(restockSearchInput.value.length, restockSearchInput.value.length);
  }
  document.querySelectorAll('[data-restockpick]').forEach(row=>{
    row.onclick = ()=>{
      const productId = row.dataset.restockpick;
      const product = state.products.find(p=>p.id===productId);
      if(product && product.hasVariants){
        state.restockPickerFor = state.restockPickerFor===productId ? null : productId;
        render();
      } else {
        addToRestockCart(productId);
      }
    };
  });
  document.querySelectorAll('[data-addrestockvariant]').forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      const [pid, vid] = b.dataset.addrestockvariant.split('::');
      addToRestockCart(pid, vid);
    };
  });
  document.querySelectorAll('[data-restockqty]').forEach(inp=>{
    inp.onchange = ()=> setRestockQty(inp.dataset.restockqty, inp.value);
  });
  document.querySelectorAll('[data-rmrestock]').forEach(b=> b.onclick = ()=> removeFromRestockCart(b.dataset.rmrestock));
  const scanRestockBtn = document.getElementById('scanRestockBtn');
  if(scanRestockBtn) scanRestockBtn.onclick = ()=> startScan((product)=>{ addToRestockCart(product.id); setMsg(`Added: ${product.name}`,'ok'); });
  const confirmRestockBtn = document.getElementById('confirmRestockBtn');
  if(confirmRestockBtn) confirmRestockBtn.onclick = ()=>{
    if(confirmRestockBtn.disabled) return;
    confirmRestockBtn.disabled = true;
    confirmRestockBtn.textContent = 'Processing…';
    commitRestock();
  };

  // Reconcile
  const reconcileForm = document.getElementById('reconcileForm');
  if(reconcileForm) reconcileForm.onsubmit = (e)=>{
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    if(btn){ if(btn.disabled) return; btn.disabled = true; btn.textContent = 'Saving…'; }
    submitReconcile(new FormData(e.target));
  };

  // Insights
  const genBtn = document.getElementById('genInsightsBtn');
  if(genBtn) genBtn.onclick = generateInsights;

  // Backup
  const genShopCodeBtn = document.getElementById('genShopCodeBtn');
  if(genShopCodeBtn) genShopCodeBtn.onclick = generateShopCodeForExistingShop;
  const connectDriveBtn = document.getElementById('connectDriveBtn');
  if(connectDriveBtn) connectDriveBtn.onclick = connectGoogleDrive;
  const backupNowBtn = document.getElementById('backupNowBtn');
  if(backupNowBtn) backupNowBtn.onclick = backupToGoogleDrive;
  const restoreDriveBtn = document.getElementById('restoreDriveBtn');
  if(restoreDriveBtn) restoreDriveBtn.onclick = restoreFromGoogleDrive;

  // Staff
  const addStaffForm = document.getElementById('addStaffForm');
  if(addStaffForm) addStaffForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); addStaff(f.get('name'), f.get('pin'), f.get('role'), f.get('email'), f.get('secQuestion'), f.get('secAnswer')); e.target.reset(); };
  document.querySelectorAll('[data-delstaff]').forEach(b=> b.onclick = ()=>{ if(confirm('Remove this staff member? They will no longer be able to log in.')) removeStaff(b.dataset.delstaff); });
  document.querySelectorAll('[data-resetpin]').forEach(b=> b.onclick = ()=>{ state.resetPinFor = state.resetPinFor===b.dataset.resetpin ? null : b.dataset.resetpin; render(); });
  document.querySelectorAll('[data-cancelreset]').forEach(b=> b.onclick = ()=>{ state.resetPinFor = null; render(); });
  document.querySelectorAll('[data-resetpinform]').forEach(f=> f.onsubmit = (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    adminResetPin(f.dataset.resetpinform, fd.get('newPin'));
  });
}

document.addEventListener('click', (e)=>{
  if(state.moreOpen && !e.target.closest('.more-wrap')){ state.moreOpen = false; render(); }
});
document.getElementById('scanCancelBtn').onclick = stopScan;
loadAll();
waitForGoogleThenInit();
</script>
</body>
