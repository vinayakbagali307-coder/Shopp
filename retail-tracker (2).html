<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukan Khata — Stock &amp; Billing Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDEAE0;
    --paper-raised:#F4F2EA;
    --ink:#232323;
    --ink-soft:#5B5748;
    --ink-blue:#2B3A67;
    --margin-red:#A63D2F;
    --stock-green:#3F6C51;
    --line:#C9C2B2;
    --line-strong:#A79E88;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:960px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper-raised);
    position:relative;
    border-left:3px solid var(--margin-red);
    padding-left:28px;
    box-shadow:0 0 40px rgba(0,0,0,0.06);
  }
  .app::before{
    content:'';
    position:absolute;
    left:-3px; top:0; bottom:0;
    width:1px;
    background:repeating-linear-gradient(to bottom, var(--margin-red) 0 6px, transparent 6px 14px);
    opacity:.5;
  }
  header.top{
    padding:28px 32px 18px 24px;
    border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px;
  }
  header.top h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    margin:0;
    letter-spacing:-0.01em;
  }
  header.top .sub{
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-top:2px;
  }
  .userchip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--paper);
    border:1px solid var(--line-strong);
    padding:6px 12px;
    border-radius:2px;
    display:flex; align-items:center; gap:10px;
  }
  .userchip button{
    background:none;border:none;color:var(--margin-red);cursor:pointer;font-family:inherit;font-size:12px;padding:0;text-decoration:underline;
  }
  nav.tabs{
    display:flex; gap:2px; padding:0 24px; border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  nav.tabs button{
    font-family:'Fraunces',serif;
    font-size:14px;
    font-weight:600;
    background:none;
    border:none;
    padding:12px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  nav.tabs button.active{
    color:var(--ink-blue);
    border-bottom-color:var(--margin-red);
  }
  main{padding:26px 32px 60px 24px;}
  .grid{display:grid; gap:16px;}
  .cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); margin-bottom:24px;}
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    padding:16px 18px;
    border-radius:2px;
  }
  .card .label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);}
  .card .value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--ink-blue);margin-top:6px;}
  .card.alert .value{color:var(--margin-red);}
  .card.good .value{color:var(--stock-green);}
  h2.section-title{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    margin:0 0 14px 0;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
    color:var(--ink-blue);
  }
  table{width:100%; border-collapse:collapse; margin-bottom:28px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); font-weight:500; padding:8px 10px; border-bottom:1px solid var(--line-strong);
  }
  td{padding:9px 10px; border-bottom:1px solid var(--line); font-size:14px;}
  td.num, th.num{font-family:'IBM Plex Mono',monospace; text-align:right; font-variant-numeric:tabular-nums;}
  tr.low td.num.stock{color:var(--margin-red); font-weight:600;}
  tr.low td:first-child::after{content:' ⚠'; color:var(--margin-red);}
  .form-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; align-items:end;}
  .field{display:flex; flex-direction:column; gap:4px;}
  .field label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
  .field input, .field select{
    font-family:'IBM Plex Sans',sans-serif;
    padding:8px 10px;
    border:1px solid var(--line-strong);
    background:#fff;
    border-radius:2px;
    font-size:14px;
    min-width:140px;
  }
  .field input[type=number]{font-family:'IBM Plex Mono',monospace;}
  button.primary{
    font-family:'Fraunces',serif;
    font-weight:600;
    background:var(--ink-blue);
    color:#fff;
    border:none;
    padding:9px 20px;
    border-radius:2px;
    cursor:pointer;
    font-size:14px;
  }
  button.primary:hover{background:#233054;}
  button.primary.green{background:var(--stock-green);}
  button.primary.green:hover{background:#335b44;}
  button.primary.whatsapp{background:#3F6C51;}
  button.primary:disabled{opacity:.5; cursor:not-allowed;}
  button.ghost{
    background:none; border:1px solid var(--line-strong); color:var(--ink-soft);
    padding:6px 12px; border-radius:2px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif;
  }
  button.link-danger{background:none;border:none;color:var(--margin-red);cursor:pointer;font-size:12px;text-decoration:underline;}
  .msg{font-size:13px; padding:8px 12px; border-radius:2px; margin-bottom:14px;}
  .msg.error{background:#F6E4DF; color:var(--margin-red); border:1px solid #E2B6A8;}
  .msg.ok{background:#E6EEE8; color:var(--stock-green); border:1px solid #B9D4C1;}
  .login-wrap{
    display:flex; align-items:center; justify-content:center; min-height:80vh; padding:24px;
  }
  .login-box{
    background:var(--paper); border:1px solid var(--line); padding:36px 32px; width:100%; max-width:360px; border-radius:2px;
  }
  .login-box h1{font-family:'Fraunces',serif; font-size:24px; margin:0 0 4px 0;}
  .login-box .sub{font-size:12px; color:var(--ink-soft); margin-bottom:22px;}
  .login-box .field{margin-bottom:14px;}
  .login-box .field input, .login-box .field select{width:100%;}
  .insight-box{
    background:var(--paper); border:1px solid var(--line); padding:20px 22px; border-radius:2px;
    font-size:14px; line-height:1.7; white-space:pre-wrap;
  }
  .insight-box.empty{color:var(--ink-soft); font-style:italic;}
  .movement-type{font-family:'IBM Plex Mono',monospace; font-size:11px; padding:2px 7px; border-radius:2px;}
  .movement-type.sale{background:#F6E4DF; color:var(--margin-red);}
  .movement-type.in{background:#E6EEE8; color:var(--stock-green);}
  .loading-dot{display:inline-block; animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
  .empty-state{font-size:13px; color:var(--ink-soft); font-style:italic; padding:12px 0;}

  .billing-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:24px;}
  @media (max-width:800px){ .billing-grid{grid-template-columns:1fr;} }
  .search-results{border:1px solid var(--line); background:#fff; border-radius:2px; max-height:340px; overflow-y:auto;}
  .search-row{display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer;}
  .search-row:last-child{border-bottom:none;}
  .search-row:hover{background:var(--paper);}
  .search-row .name{font-size:14px;}
  .search-row .meta{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .search-row.disabled{opacity:.4; cursor:not-allowed;}
  .cart-box{border:1px solid var(--line); background:var(--paper); border-radius:2px; padding:16px;}
  .cart-item{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line);}
  .cart-item:last-child{border-bottom:none;}
  .cart-item .cname{flex:1; font-size:13px;}
  .qty-ctrl{display:flex; align-items:center; gap:6px;}
  .qty-ctrl button{width:24px; height:24px; border:1px solid var(--line-strong); background:#fff; border-radius:2px; cursor:pointer; font-family:'IBM Plex Mono',monospace;}
  .qty-ctrl span{font-family:'IBM Plex Mono',monospace; min-width:20px; text-align:center; font-size:13px;}
  .cart-item .lineprice{font-family:'IBM Plex Mono',monospace; font-size:13px; width:64px; text-align:right;}
  .cart-item .rm{background:none;border:none;color:var(--margin-red);cursor:pointer;font-size:16px;line-height:1;}
  .cart-total{display:flex; justify-content:space-between; align-items:baseline; padding-top:12px; margin-top:8px; border-top:2px solid var(--ink-blue);}
  .cart-total .lbl{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
  .cart-total .amt{font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; color:var(--ink-blue);}
  .receipt-box{background:#fff; border:1px dashed var(--line-strong); padding:18px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; white-space:pre-wrap; line-height:1.6; margin-top:16px;}

  @media (max-width:600px){
    main{padding:20px 16px 60px 12px;}
    header.top{padding:20px 16px 14px 12px;}
    .app{border-left-width:2px; padding-left:14px;}
    nav.tabs{padding:0 12px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<div id="scanModal" style="display:none; position:fixed; inset:0; background:rgba(20,18,14,.88); z-index:999; align-items:center; justify-content:center; flex-direction:column; padding:20px;">
  <video id="scanVideo" style="max-width:92%; max-height:65vh; border-radius:4px; border:2px solid #EDEAE0;" playsinline muted></video>
  <div style="color:#EDEAE0; margin-top:14px; font-family:'IBM Plex Sans',sans-serif; font-size:14px;" id="scanStatus">Point the camera at the barcode…</div>
  <button id="scanCancelBtn" style="margin-top:16px; background:#A63D2F; color:#fff; border:none; padding:9px 22px; border-radius:2px; cursor:pointer; font-family:'Fraunces',serif; font-weight:600;">Cancel</button>
</div>

<script>
const SHOP_NAME = 'Dukan Khata';
const STORAGE_KEYS = { staff:'shop:staff', products:'shop:products', movements:'shop:movements' };

let state = {
  loaded:false,
  currentUser:null,
  staff:[],
  products:[],
  movements:[],
  view:'login',
  msg:null,
  insightText:'',
  insightLoading:false,
  cart:[],
  billingSearch:'',
  lastReceipt:null,
};

async function loadAll(){
  const [s,p,m] = await Promise.all([
    safeGet(STORAGE_KEYS.staff), safeGet(STORAGE_KEYS.products), safeGet(STORAGE_KEYS.movements)
  ]);
  state.staff = s || [];
  state.products = p || [];
  state.movements = m || [];
  state.loaded = true;
  state.view = state.staff.length === 0 ? 'setup' : 'login';
  render();
}

async function safeGet(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveKey(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
  }catch(e){ console.error('save failed', key, e); }
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ return '₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }
function fmtDate(d){ const dt=new Date(d); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }

function setMsg(text, type){
  state.msg = {text, type};
  render();
  setTimeout(()=>{ state.msg=null; render(); }, 3500);
}

// ---------- Auth actions ----------
async function createAdmin(name, pin){
  if(!name.trim() || pin.length<4){ setMsg('Enter a name and a 4-digit PIN','error'); return; }
  const staffMember = {id:uid(), name:name.trim(), pin, role:'admin'};
  state.staff = [staffMember];
  await saveKey(STORAGE_KEYS.staff, state.staff);
  state.currentUser = staffMember;
  state.view='billing';
  render();
}

async function loginStaff(staffId, pin){
  const member = state.staff.find(s=>s.id===staffId);
  if(!member || member.pin !== pin){ setMsg('Wrong PIN, try again','error'); return; }
  state.currentUser = member;
  state.view='billing';
  render();
}

function logout(){
  state.currentUser=null;
  state.cart=[];
  state.view='login';
  render();
}

async function addStaff(name, pin, role){
  if(!name.trim()||pin.length<4){ setMsg('Enter name and 4-digit PIN','error'); return; }
  if(state.staff.some(s=>s.name.toLowerCase()===name.trim().toLowerCase())){ setMsg('That name is already used','error'); return; }
  state.staff.push({id:uid(), name:name.trim(), pin, role});
  await saveKey(STORAGE_KEYS.staff, state.staff);
  setMsg('Staff member added','ok');
  render();
}

async function removeStaff(id){
  if(id===state.currentUser.id){ setMsg("You can't remove yourself",'error'); return; }
  state.staff = state.staff.filter(s=>s.id!==id);
  await saveKey(STORAGE_KEYS.staff, state.staff);
  render();
}

// ---------- Product actions ----------
async function addProduct(data){
  if(!data.name.trim()){ setMsg('Product name required','error'); return; }
  state.products.push({
    id:uid(), name:data.name.trim(), category:data.category.trim()||'General',
    costPrice:Number(data.costPrice)||0, sellPrice:Number(data.sellPrice)||0,
    stock:Number(data.stock)||0, reorderLevel:Number(data.reorderLevel)||5,
    barcode:(data.barcode||'').trim()
  });
  await saveKey(STORAGE_KEYS.products, state.products);
  setMsg('Product added','ok');
  render();
}

async function bulkAddProducts(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length===0){ setMsg('Paste at least one product line','error'); return; }
  let added = 0, skipped = 0;
  lines.forEach(line=>{
    const parts = line.split(',').map(p=>p.trim());
    const name = parts[0];
    if(!name){ skipped++; return; }
    state.products.push({
      id:uid(), name,
      category: parts[1] || 'General',
      costPrice: Number(parts[2]) || 0,
      sellPrice: Number(parts[3]) || 0,
      stock: Number(parts[4]) || 0,
      reorderLevel: Number(parts[5]) || 5,
      barcode: parts[6] || ''
    });
    added++;
  });
  await saveKey(STORAGE_KEYS.products, state.products);
  setMsg(`Added ${added} product${added!==1?'s':''}${skipped?`, skipped ${skipped} bad line${skipped!==1?'s':''}`:''}`, 'ok');
  render();
}

async function deleteProduct(id){
  state.products = state.products.filter(p=>p.id!==id);
  await saveKey(STORAGE_KEYS.products, state.products);
  render();
}

async function recordStockIn(productId, qty, note){
  const product = state.products.find(p=>p.id===productId);
  qty = Number(qty);
  if(!product || !qty || qty<=0){ setMsg('Pick a product and valid quantity','error'); return; }
  product.stock += qty;
  state.movements.unshift({
    id:uid(), productId, productName:product.name, type:'in', qty,
    amount:Number(product.costPrice)*qty, date:new Date().toISOString(), staff:state.currentUser.name, note:note||''
  });
  await Promise.all([saveKey(STORAGE_KEYS.products,state.products), saveKey(STORAGE_KEYS.movements,state.movements)]);
  setMsg(`Stocked in ${qty} × ${product.name}`,'ok');
  render();
}

function lookupByBarcode(code){
  return state.products.find(p=>p.barcode && p.barcode===code.trim());
}

// ---------- Fast Billing (cart) ----------
function addToCart(productId){
  const product = state.products.find(p=>p.id===productId);
  if(!product) return;
  if(product.stock<=0){ setMsg(`${product.name} is out of stock`,'error'); return; }
  const existing = state.cart.find(c=>c.productId===productId);
  if(existing){
    if(existing.qty < product.stock) existing.qty += 1;
    else setMsg(`Only ${product.stock} in stock`,'error');
  } else {
    state.cart.push({productId, name:product.name, qty:1, price:product.sellPrice});
  }
  state.billingSearch='';
  render();
}

function changeCartQty(productId, delta){
  const product = state.products.find(p=>p.id===productId);
  const item = state.cart.find(c=>c.productId===productId);
  if(!item) return;
  const newQty = item.qty + delta;
  if(newQty<=0){ state.cart = state.cart.filter(c=>c.productId!==productId); }
  else if(product && newQty > product.stock){ setMsg(`Only ${product.stock} in stock`,'error'); return; }
  else item.qty = newQty;
  render();
}

function removeFromCart(productId){
  state.cart = state.cart.filter(c=>c.productId!==productId);
  render();
}

function cartTotal(){
  return state.cart.reduce((sum,c)=>sum + c.qty*c.price, 0);
}

async function completeSale(){
  if(state.cart.length===0){ setMsg('Cart is empty','error'); return; }
  const now = new Date().toISOString();
  const soldItems = [];
  for(const item of state.cart){
    const product = state.products.find(p=>p.id===item.productId);
    if(!product) continue;
    const qty = Math.min(item.qty, product.stock);
    if(qty<=0) continue;
    product.stock -= qty;
    state.movements.unshift({
      id:uid(), productId:item.productId, productName:product.name, type:'sale', qty,
      amount: item.price*qty, date:now, staff:state.currentUser.name, note:''
    });
    soldItems.push({name:product.name, qty, price:item.price, lineTotal:item.price*qty});
  }
  await Promise.all([saveKey(STORAGE_KEYS.products,state.products), saveKey(STORAGE_KEYS.movements,state.movements)]);
  state.lastReceipt = { items:soldItems, total:soldItems.reduce((a,i)=>a+i.lineTotal,0), date:now, staff:state.currentUser.name };
  state.cart = [];
  state.billingSearch='';
  setMsg('Sale completed','ok');
  render();
}

function buildReceiptText(receipt){
  const lines = [];
  lines.push(`🧾 ${SHOP_NAME}`);
  lines.push(new Date(receipt.date).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'}));
  lines.push('------------------------------');
  receipt.items.forEach(i=>{
    lines.push(`${i.name}  x${i.qty}  ${fmtMoney(i.lineTotal)}`);
  });
  lines.push('------------------------------');
  lines.push(`Total: ${fmtMoney(receipt.total)}`);
  lines.push('');
  lines.push('Thank you for shopping with us!');
  return lines.join('\n');
}

function sendReceiptWhatsapp(phone){
  if(!state.lastReceipt) return;
  const text = encodeURIComponent(buildReceiptText(state.lastReceipt));
  let url;
  if(phone && phone.trim()){
    let digits = phone.trim().replace(/\D/g,'');
    if(digits.length===10) digits = '91'+digits;
    url = `https://wa.me/${digits}?text=${text}`;
  } else {
    url = `https://wa.me/?text=${text}`;
  }
  window.open(url, '_blank');
}

function newSale(){
  state.lastReceipt = null;
  render();
}

// ---------- AI Insights ----------
async function generateInsights(){
  state.insightLoading = true;
  state.insightText='';
  render();
  try{
    const salesByProduct = {};
    const last30 = state.movements.filter(m=>{
      const days = (Date.now()-new Date(m.date).getTime())/86400000;
      return days<=30 && m.type==='sale';
    });
    last30.forEach(m=>{
      salesByProduct[m.productName] = (salesByProduct[m.productName]||0)+m.qty;
    });
    const lowStock = state.products.filter(p=>p.stock<=p.reorderLevel).map(p=>`${p.name} (stock ${p.stock}, reorder at ${p.reorderLevel})`);
    const summary = {
      totalProducts: state.products.length,
      last30DaysUnitsSoldByProduct: salesByProduct,
      lowStockItems: lowStock,
      totalSalesValueLast30Days: last30.reduce((a,m)=>a+m.amount,0),
    };
    const prompt = `You are analyzing a small Indian retail shop's inventory and sales data. Here is a JSON summary of the last 30 days:
${JSON.stringify(summary,null,2)}

Give practical, concise insights for the shop owner in plain text (no markdown headers, just short paragraphs or a simple dash list):
1. Best-selling products and any pattern worth noting
2. Slow-moving or low-stock items needing attention, with a restock suggestion
3. One or two concrete actions the owner could take this week
Keep it under 180 words, friendly and direct, no fluff.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user", content:prompt}]
      })
    });
    const data = await response.json();
    const text = (data.content||[]).map(b=>b.text||'').join('\n').trim();
    state.insightText = text || 'No insights returned. Try again once you have a bit more sales data logged.';
  }catch(e){
    state.insightText = 'Could not generate insights right now. Please try again.';
  }
  state.insightLoading = false;
  render();
}

// ---------- Barcode scanning ----------
let scanStream = null;
let scanRAF = null;
let scanTargetHandler = null;

async function startScan(onMatch){
  const modal = document.getElementById('scanModal');
  const video = document.getElementById('scanVideo');
  const status = document.getElementById('scanStatus');
  if(!('BarcodeDetector' in window)){
    setMsg("Camera barcode scanning isn't supported on this browser. Try Chrome on Android, or search by name instead.",'error');
    return;
  }
  scanTargetHandler = onMatch;
  modal.style.display = 'flex';
  status.textContent = 'Point the camera at the barcode…';
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = scanStream;
    await video.play();
    const detector = new BarcodeDetector();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const tick = async ()=>{
      if(!scanStream) return;
      if(video.videoWidth){
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0);
        try{
          const codes = await detector.detect(canvas);
          if(codes.length>0){
            const value = codes[0].rawValue;
            const product = lookupByBarcode(value);
            stopScan();
            if(product){ scanTargetHandler(product); }
            else { setMsg(`No product matches barcode ${value}. Add it via Inventory.`,'error'); }
            return;
          }
        }catch(e){ /* keep trying */ }
      }
      scanRAF = requestAnimationFrame(tick);
    };
    tick();
  }catch(e){
    setMsg('Could not access the camera — check permissions.','error');
    modal.style.display = 'none';
  }
}

function stopScan(){
  const modal = document.getElementById('scanModal');
  if(modal) modal.style.display = 'none';
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF = null; }
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

// ---------- Render ----------
function render(){
  const root = document.getElementById('root');
  if(!state.loaded){ root.innerHTML = '<div style="padding:60px;text-align:center;color:#5B5748;font-family:IBM Plex Sans,sans-serif;">Opening the register…</div>'; return; }
  if(!state.currentUser){ root.innerHTML = renderLogin(); attachLoginHandlers(); return; }

  root.innerHTML = `
    <div class="app">
      <header class="top">
        <div>
          <h1>Dukan Khata</h1>
          <div class="sub">Stock &amp; Billing Register</div>
        </div>
        <div class="userchip">${escapeHtml(state.currentUser.name)} · ${state.currentUser.role}
          <button id="logoutBtn">log out</button>
        </div>
      </header>
      <nav class="tabs">
        ${tabBtn('billing','Fast Billing')}
        ${tabBtn('dashboard','Dashboard')}
        ${tabBtn('inventory','Inventory')}
        ${tabBtn('stockin','Stock In')}
        ${tabBtn('insights','AI Insights')}
        ${state.currentUser.role==='admin' ? tabBtn('staff','Staff') : ''}
      </nav>
      <main>
        ${state.msg ? `<div class="msg ${state.msg.type}">${escapeHtml(state.msg.text)}</div>` : ''}
        ${renderView()}
      </main>
    </div>
  `;
  attachAppHandlers();
}

function tabBtn(view,label){
  return `<button data-view="${view}" class="${state.view===view?'active':''}">${label}</button>`;
}

function renderView(){
  switch(state.view){
    case 'inventory': return renderInventory();
    case 'stockin': return renderStockIn();
    case 'insights': return renderInsights();
    case 'staff': return renderStaff();
    case 'dashboard': return renderDashboard();
    default: return renderBilling();
  }
}

// ---------- Fast Billing view ----------
function renderBilling(){
  if(state.lastReceipt){
    const r = state.lastReceipt;
    return `
      <h2 class="section-title">Sale Complete</h2>
      <div class="receipt-box">${escapeHtml(buildReceiptText(r))}</div>
      <div class="form-row" style="margin-top:16px;">
        <div class="field"><label>Customer WhatsApp (optional)</label><input id="receiptPhone" placeholder="10-digit number, or leave blank"></div>
        <button class="primary whatsapp" id="sendReceiptBtn" type="button">Send Receipt on WhatsApp</button>
        <button class="primary" id="newSaleBtn" type="button">Start New Sale</button>
      </div>
    `;
  }

  const q = state.billingSearch.trim().toLowerCase();
  const matches = q.length===0 ? [] : state.products.filter(p=>
    p.name.toLowerCase().includes(q) || (p.barcode && p.barcode.includes(q))
  ).slice(0,8);

  return `
    <div class="billing-grid">
      <div>
        <h2 class="section-title">Add Items</h2>
        <div class="form-row">
          <div class="field" style="flex:1;"><label>Search product</label><input id="billingSearchInput" placeholder="type a product name…" value="${escapeHtml(state.billingSearch)}" autocomplete="off"></div>
          <button type="button" class="primary" id="scanBillingBtn">📷 Scan</button>
        </div>
        ${q.length>0 ? `
        <div class="search-results">
          ${matches.length===0 ? '<div class="search-row"><span class="name">No matches</span></div>' :
            matches.map(p=>`
            <div class="search-row ${p.stock<=0?'disabled':''}" data-add="${p.id}">
              <span class="name">${escapeHtml(p.name)}</span>
              <span class="meta">${fmtMoney(p.sellPrice)} · stock ${p.stock}</span>
            </div>`).join('')}
        </div>` : `<div class="empty-state">Start typing, or tap Scan to add a product by barcode.</div>`}
      </div>

      <div>
        <h2 class="section-title">Cart</h2>
        <div class="cart-box">
          ${state.cart.length===0 ? '<div class="empty-state">Cart is empty — add items from the left.</div>' : `
            ${state.cart.map(c=>`
              <div class="cart-item">
                <div class="cname">${escapeHtml(c.name)}</div>
                <div class="qty-ctrl">
                  <button type="button" data-qty-minus="${c.productId}">−</button>
                  <span>${c.qty}</span>
                  <button type="button" data-qty-plus="${c.productId}">+</button>
                </div>
                <div class="lineprice">${fmtMoney(c.qty*c.price)}</div>
                <button type="button" class="rm" data-rm="${c.productId}">×</button>
              </div>
            `).join('')}
            <div class="cart-total">
              <span class="lbl">Total</span>
              <span class="amt">${fmtMoney(cartTotal())}</span>
            </div>
          `}
        </div>
        ${state.cart.length>0 ? `<div class="form-row" style="margin-top:14px;"><button class="primary green" id="checkoutBtn" type="button" style="width:100%;">Complete Sale — ${fmtMoney(cartTotal())}</button></div>` : ''}
      </div>
    </div>
  `;
}

// ---------- Dashboard ----------
function renderDashboard(){
  const lowStock = state.products.filter(p=>p.stock<=p.reorderLevel);
  const todaysMovements = state.movements.filter(m=>m.date.slice(0,10)===todayStr());
  const todaysSales = todaysMovements.filter(m=>m.type==='sale');
  const todaysSalesValue = todaysSales.reduce((a,m)=>a+m.amount,0);
  const todaysUnits = todaysSales.reduce((a,m)=>a+m.qty,0);

  return `
    <div class="grid cards">
      <div class="card"><div class="label">Products</div><div class="value">${state.products.length}</div></div>
      <div class="card ${lowStock.length?'alert':''}"><div class="label">Low Stock</div><div class="value">${lowStock.length}</div></div>
      <div class="card good"><div class="label">Sold Today</div><div class="value">${todaysUnits} units</div></div>
      <div class="card good"><div class="label">Today's Sales Value</div><div class="value">${fmtMoney(todaysSalesValue)}</div></div>
    </div>

    <h2 class="section-title">Low Stock Alert</h2>
    ${lowStock.length===0 ? '<div class="empty-state">Nothing running low right now.</div>' : `
    <table><thead><tr><th>Product</th><th class="num">Stock</th><th class="num">Reorder At</th></tr></thead>
    <tbody>${lowStock.map(p=>`<tr class="low"><td>${escapeHtml(p.name)}</td><td class="num stock">${p.stock}</td><td class="num">${p.reorderLevel}</td></tr>`).join('')}</tbody></table>`}

    <h2 class="section-title">Recent Activity</h2>
    ${state.movements.length===0 ? '<div class="empty-state">No sales or stock-ins recorded yet.</div>' : `
    <table><thead><tr><th>Date</th><th>Product</th><th>Type</th><th class="num">Qty</th><th class="num">Amount</th><th>By</th></tr></thead>
    <tbody>${state.movements.slice(0,12).map(m=>`
      <tr>
        <td>${fmtDate(m.date)}</td>
        <td>${escapeHtml(m.productName)}</td>
        <td><span class="movement-type ${m.type}">${m.type==='sale'?'SALE':'STOCK IN'}</span></td>
        <td class="num">${m.qty}</td>
        <td class="num">${fmtMoney(m.amount)}</td>
        <td>${escapeHtml(m.staff)}</td>
      </tr>`).join('')}</tbody></table>`}
  `;
}

        <div class="field"><label>Sell Price</label><input name="sellPrice" type="number" min="0" step="0.01"></div>
        <div class="field"><label>Opening Stock</label><input name="stock" type="number" min="0"></div>

        <button class="primary" type="submit">Add Product</button>
      </div>
    </form>

    ${state.products.length===0 ? '<div class="empty-state">No products yet — add your first ones above.</div>' : `

  return state.products.map(p=>`<option value="${p.id}">${escapeHtml(p.name)} (stock: ${p.stock})</option>`).join('');
}

function renderStockIn(){
  if(state.products.length===0) return '<div class="empty-state">Add products in Inventory first.</div>';
  return `
    <h2 class="section-title">Stock In (Restock)</h2>
    <div class="form-row">
      <button type="button" class="primary green" id="scanStockInBtn">📷 Scan Barcode</button>
      <div class="field"><label>or type barcode + Enter</label><input id="stockInBarcodeInput" placeholder="barcode"></div>
    </div>
    <form id="stockInForm">
      <div class="form-row">
        <div class="field"><label>Product</label><select name="productId" id="stockInProduct">${productOptions()}</select></div>

        <button class="primary green" type="submit">Add to Stock</button>

    <h2 class="section-title">AI Insights</h2>

        ${state.insightLoading?'Analyzing<span class="loading-dot">…</span>':'Generate Insights'}

    <h2 class="section-title">Add Staff</h2>
    <form id="addStaffForm">
      <div class="form-row">
        <div class="field"><label>Name</label><input name="name" required></div>

          <select name="role"><option value="staff">staff</option><option value="admin">admin</option></select>

      <tr><td>${escapeHtml(s.name)}</td><td>${s.role}</td>

// ---------- Login ----------
function renderLogin(){
  if(state.view==='setup'){
    return `<div class="login-wrap"><div class="login-box">
      <h1>Dukan Khata</h1>
      <div class="sub">Set up the shop's admin account</div>
      ${state.msg?`<div class="msg ${state.msg.type}">${escapeHtml(state.msg.text)}</div>`:''}
      <form id="setupForm">
        <div class="field"><label>Your Name</label><input name="name" required></div>
        <div class="field"><label>Set a 4-digit PIN</label><input name="pin" maxlength="6" required></div>
        <button class="primary" type="submit" style="width:100%;">Create Admin Account</button>
      </form>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:14px;">Data is stored against this app link and shared with anyone you give it to — good for you and your staff, but don't share the link publicly.</div>
    </div></div>`;
  }
  return `<div class="login-wrap"><div class="login-box">
    <h1>Dukan Khata</h1>
    <div class="sub">Sign in to the register</div>
    ${state.msg?`<div class="msg ${state.msg.type}">${escapeHtml(state.msg.text)}</div>`:''}
    <form id="loginForm">
      <div class="field"><label>Name</label>
        <select name="staffId">${state.staff.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>PIN</label><input name="pin" type="password" maxlength="6" required></div>
      <button class="primary" type="submit" style="width:100%;">Log In</button>
    </form>
  </div></div>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Event wiring ----------
function attachLoginHandlers(){
  const setupForm = document.getElementById('setupForm');
  if(setupForm) setupForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); createAdmin(f.get('name'), f.get('pin')); };
  const loginForm = document.getElementById('loginForm');
  if(loginForm) loginForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); loginStaff(f.get('staffId'), f.get('pin')); };
}

function attachAppHandlers(){
  document.getElementById('logoutBtn').onclick = logout;
  document.querySelectorAll('nav.tabs button').forEach(btn=>{
    btn.onclick = ()=>{ state.view = btn.dataset.view; state.insightText=''; render(); };
  });

  const searchInput = document.getElementById('billingSearchInput');
  if(searchInput){
    searchInput.oninput = (e)=>{ state.billingSearch = e.target.value; render(); };
    searchInput.focus();
    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
  }
  document.querySelectorAll('[data-add]').forEach(row=>{
    row.onclick = ()=>{ if(!row.classList.contains('disabled')) addToCart(row.dataset.add); };
  });
  document.querySelectorAll('[data-qty-plus]').forEach(b=> b.onclick = ()=> changeCartQty(b.dataset.qtyPlus, 1));
  document.querySelectorAll('[data-qty-minus]').forEach(b=> b.onclick = ()=> changeCartQty(b.dataset.qtyMinus, -1));
  document.querySelectorAll('[data-rm]').forEach(b=> b.onclick = ()=> removeFromCart(b.dataset.rm));
  const scanBillingBtn = document.getElementById('scanBillingBtn');
  if(scanBillingBtn) scanBillingBtn.onclick = ()=> startScan((product)=>{ addToCart(product.id); setMsg(`Added: ${product.name}`,'ok'); });
  const checkoutBtn = document.getElementById('checkoutBtn');
  if(checkoutBtn) checkoutBtn.onclick = completeSale;
  const sendReceiptBtn = document.getElementById('sendReceiptBtn');
  if(sendReceiptBtn) sendReceiptBtn.onclick = ()=>{
    const phone = document.getElementById('receiptPhone').value;
    sendReceiptWhatsapp(phone);
  };
  const newSaleBtn = document.getElementById('newSaleBtn');
  if(newSaleBtn) newSaleBtn.onclick = newSale;

  const addProductForm = document.getElementById('addProductForm');
  if(addProductForm) addProductForm.onsubmit = (e)=>{
    e.preventDefault(); const f=new FormData(e.target);
    addProduct({name:f.get('name'), category:f.get('category'), costPrice:f.get('costPrice'), sellPrice:f.get('sellPrice'), stock:f.get('stock'), reorderLevel:f.get('reorderLevel'), barcode:f.get('barcode')});
    e.target.reset();
  };
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=> deleteProduct(b.dataset.del));
  const bulkAddForm = document.getElementById('bulkAddForm');
  if(bulkAddForm) bulkAddForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); bulkAddProducts(f.get('bulk')); e.target.reset(); };

  const stockInForm = document.getElementById('stockInForm');
  if(stockInForm){
    stockInForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); recordStockIn(f.get('productId'), f.get('qty'), f.get('note')); };
    const productSel = document.getElementById('stockInProduct');
    const scanBtn = document.getElementById('scanStockInBtn');
    if(scanBtn) scanBtn.onclick = ()=> startScan((product)=>{ productSel.value = product.id; setMsg(`Found: ${product.name}`,'ok'); });
    const barcodeInput = document.getElementById('stockInBarcodeInput');
    if(barcodeInput) barcodeInput.onkeydown = (e)=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const product = lookupByBarcode(barcodeInput.value);
        if(product){ productSel.value = product.id; setMsg(`Found: ${product.name}`,'ok'); barcodeInput.value=''; }
        else setMsg('No product matches that barcode','error');
      }
    };
  }

  const genBtn = document.getElementById('genInsightsBtn');
  if(genBtn) genBtn.onclick = generateInsights;

  const addStaffForm = document.getElementById('addStaffForm');
  if(addStaffForm) addStaffForm.onsubmit = (e)=>{ e.preventDefault(); const f=new FormData(e.target); addStaff(f.get('name'), f.get('pin'), f.get('role')); e.target.reset(); };
  document.querySelectorAll('[data-delstaff]').forEach(b=> b.onclick = ()=> removeStaff(b.dataset.delstaff));
}

document.getElementById('scanCancelBtn').onclick = stopScan;
loadAll();
</script>
